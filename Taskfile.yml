version: "3"

vars:
  site_dir: website
  site_url: https://net-auto.nl
  rfp_form_url: https://forms.gle/qmjaMqcHLuJV3rTy8
  upcoming_event_filename:
    sh: |
      # Get current date in YYYYMMDD format
      current_date=$(date +%Y%m%d)

      # Find the next upcoming event file
      upcoming_file=$(find {{.site_dir}}/docs/events/dates/ -name "*.md" -type f | \
        while read file; do
          filename=$(basename "$file")
          file_date=$(echo "$filename" | cut -d'_' -f1)
          if [[ "$file_date" > "$current_date" ]]; then
            echo "$file_date:$file"
          fi
        done | sort | head -1 | cut -d':' -f2)
        filename=$(basename "$upcoming_file" .md)
        if [[ -z "$filename" ]]; then
          echo "No upcoming events found in {{.site_dir}}/docs/events/dates/"
          exit 1
        fi
        echo "$filename"
  upcoming_event_date:
    sh: echo "{{.upcoming_event_filename}}" | cut -d'_' -f1
  upcoming_event_sponsor:
    sh: echo "{{.upcoming_event_filename}}" | cut -d'_' -f2- | cut -d'.' -f1
  upcoming_date_formatted:
    sh: |
      raw_date="{{.upcoming_event_date}}"
      echo "${raw_date:0:4}-${raw_date:4:2}-${raw_date:6:2}"

tasks:
  default: task -l --sort none

  build:
    desc: Build the site
    dir: "{{.site_dir}}"
    cmd: |
      export DYLD_FALLBACK_LIBRARY_PATH=/opt/homebrew/lib
      uv run mkdocs build -v --strict -t material

  test:
    desc: Run the github test workflow with act
    cmds:
      - act -j test

  test:pytest:
    desc: Run pytest
    dir: website
    cmds:
      - uv run pytest -v

  deploy:
    desc: Deploy the site to GitHub Pages branch
    aliases: [deploy]
    prompt:
      - This actually deploys the site. Do you want to continue?
    cmds:
      - uv run mkdocs gh-deploy --force

  serve:
    desc: Serve the site
    dir: website
    cmd: |
      export DYLD_FALLBACK_LIBRARY_PATH=/opt/homebrew/lib
      open http://localhost:8000/
      uv run mkdocs serve

  ### Initialize the repo
  init:
    desc: Initialize this repo install all dependencies for uv and mac
    cmds:
      - task: init:uv
      - task: init:mac

  init:uv:
    desc: Initialize this repo with python dependencies with uv
    cmds:
      - uv sync

  init:mac:
    desc: Initialize this repo with mac dependencies
    platforms:
      - darwin
    cmds:
      - brew install cairo freetype libffi libjpeg libpng zlib pngquant

  event:
    desc: Create a new event and open it in vscode
    aliases: [new, post]
    silent: true
    interactive: true
    cmd: |
      echo "Provide the date in format YYYY-MM-DD for the next event:"
      read event_date
      echo "Provide the sponsor of the next event (without spaces, in the desired case):"
      read event_sponsor
      echo "What is the website? (full: https://net-auto.nl)"
      read event_website
      echo "What is the full address? (used for Gmaps link)"
      read event_address
      event_sponsor_lower=$(echo "$event_sponsor" | tr '[:upper:]' '[:lower:]')
      event_date_numbers=$(echo "$event_date" | sed 's/-//g')
      event_file="{{.site_dir}}/docs/events/dates/${event_date_numbers}_${event_sponsor}.md"
      sponsors=$(sed 's/_/ \& /g' <<< "$event_sponsor")

      cat << EOF >> $event_file
      ---
      # draft: true
      date:
        created: {{ now.Format "2006-01-02" }}
        updated: {{ now.Format "2006-01-02" }}
      title: NLNAM Meetup @ $sponsors
      description: $event_date NLNAM Meetup event
      ---

      # NLNAM Meetup @ $sponsors

      The next meetup is hosted by [$sponsors]($event_website){target="_blank"} on $event_date.

      Thank you $sponsors for opening your doors to host us and fill our bellies with pizzas and drinks!

      * [Register for the event](https://pretix.eu/nlnam/${event_date_numbers}-${event_sponsor_lower}/){target="_blank"}
          * Registration ends on {\{ get_older_date("$event_date", 1) }} at 23:59.
      * [Submit a presentation proposal]({{.rfp_form_url}}){target="_blank"}
          * Talks will be selected and communicated around {\{ get_older_date("$event_date", 30) }}.

      ## Specifics
      * [OPTIONAL] **<u>Bring your ID</u>** to enter the building.
      * [OPTIONAL] We have a hard stop at 21:30. We will need to be outside the building by then.
      * Parking is TODO not available

      ## Location
      {\{ google_maps_link("$event_address") }}

      ## Agenda

      | Time  | Activity                                      |
      | ----- | --------------------------------------------- |
      | 18:00 | Doors open                                    |
      | 18:25 | Welcome + **$event_sponsor** sponsor talk     |
      | 19:00 | Talk 1                                        |
      | 19:30 | Break + Pizza 🍕                               |
      | 20:00 | Talk 2                                        |
      | 20:30 | Talk 3                                        |
      | 21:00 | Closing words + networking                    |
      | 22:00 | Venue closing                                 |

      <!--## Photos
      [Link to photos](link_to_drive)
      -->
      EOF
      sed -i '' \
        -e 's@{\\@{@g' \
        "$event_file"

      task event_date=$event_date_numbers event_sponsor=$event_sponsor create_reminders_specific_event

  create_reminders_upcoming:
    desc: Create reminders for the next upcoming event (dynamically finds the closest future date)
    vars:
      event_date: "{{.upcoming_event_date}}"
      event_sponsor: "{{.upcoming_event_sponsor}}"
    cmds:
      - task: create_reminders_specific_event
        vars:
          event_date: "{{.event_date}}"
          event_sponsor: "{{.event_sponsor}}"

  create_reminders_specific_event:
    desc: Create reminders for the next upcoming event (dynamically finds the closest future date)
    requires:
      vars:
        - event_date
        - event_sponsor
    deps:
      - task: internal:reminder_rfp
        vars:
          event_date: "{{.event_date}}"
          event_sponsor: "{{.event_sponsor}}"
      - task: internal:reminder_event
        vars:
          event_date: "{{.event_date}}"
          event_sponsor: "{{.event_sponsor}}"
      - task: internal:schedule
        vars:
          event_date: "{{.event_date}}"
          event_sponsor: "{{.event_sponsor}}"

  internal:reminder_rfp:
    desc: Prepare a reminder to submit RFP for the next event
    silent: true
    vars:
      file: reminders/{{.event_date}}_rfp_linkedin.txt
    requires:
      vars:
        - event_date
        - event_sponsor
    cmd: |
      raw_date="{{.event_date}}"
      date_formatted=$(echo "${raw_date:0:4}-${raw_date:4:2}-${raw_date:6:2}")
      mkdir -p reminders
      rm {{.file}} 2>/dev/null || true
      cat << EOF >> {{.file}}
      Hi #NLNAM community!

      We have the next meetup scheduled on $date_formatted with the help of #{{ .event_sponsor }}.
      We are looking for speakers to present at the event.

      If you have a nice topic you'd like to share with the community, please submit a presentation proposal using:
      {{.rfp_form_url}}

      We especially welcome new speakers.

      If you know someone that should give a talk, please share this message with them!

      See you at the meetup!

      More info at {{.site_url}}/events/dates/{{.event_date}}_{{.event_sponsor}}/

      EOF
      echo "RFP reminder created at {{.file}}"

  internal:reminder_event:
    desc: Prepare a reminder for the next event
    silent: true
    vars:
      file: reminders/{{.event_date}}_event_linkedin.txt
    requires:
      vars:
        - event_date # YYYYMMDD
        - event_sponsor
    cmd: |
      raw_date="{{.event_date}}"
      date_formatted=$(echo "${raw_date:0:4}-${raw_date:4:2}-${raw_date:6:2}")

      mkdir -p reminders
      rm {{.file}} 2>/dev/null || true

      cat << EOF >> {{.file}}
      Hi #NLNAM community!

      We have the next meetup scheduled on $date_formatted with the help of #{{ .event_sponsor }}.
      If you haven't registered yet, you can at: https://pretix.eu/nlnam/{{.event_date}}-{{.event_sponsor | lower}}/

      At the same time we are always looking for speakers to present at the event.
      If you have a nice topic you'd like to share with the community, please submit a presentation proposal using:

      {{.rfp_form_url}}

      If you know someone that should give a talk, please share this message with them!

      See you at the meetup!

      More info at {{.site_url}}/events/dates/{{.event_date}}_{{.event_sponsor}}/

      EOF
      echo "RFP reminder created at {{.file}}"

  internal:schedule:
    desc: Prepare a schedule for the next event
    silent: true
    vars:
      file: reminders/{{.event_date}}_schedule.txt
    requires:
      vars:
        - event_date
        - event_sponsor
    cmd: |
      raw_date="{{.event_date}}"
      date_formatted=$(echo "${raw_date:0:4}-${raw_date:4:2}-${raw_date:6:2}")

      mkdir -p reminders
      rm {{.file}} 2>/dev/null || true

      cat << EOF >> {{.file}}
      Now: post on linkedIn about the new event. "cat reminders/{{.event_date}}_event_linkedin.txt"

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 90))")
      90d - Send out reminder about Event -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_event_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 70))")
      70d - Send out reminder about RfP -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_rfp_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 56))")
      56d - Send out reminder about RfP -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_rfp_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 49))")
      49d - Send out reminder about RfP -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_rfp_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 42))")
      42d - Send out reminder about Event -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_event_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 35))")
      35d - Send out reminder about Event -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_event_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 30))")
      30d - Send out reminder about First external speaker -- put in Reminders app

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 23))")
      23d - Send out reminder about Second external speaker -- put in Reminders app

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 14))")
      14d - Send out reminder about Event -- Schedule in LinkedIn
      Hi #NLNAM community!

      We have the next meetup scheduled on {{.event_date}} with the help of #{{.event_sponsor}}.
      If you haven't registered yet, you can at: https://pretix.eu/nlnam/{{.event_date}}-{{.event_sponsor | lower}}/

      See you at the meetup!

      More info at {{.site_url}}/events/dates/{{.event_date}}_{{.event_sponsor}}/

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"$date_formatted\", 2))")
      2d - Send out last reminder about Event -- Schedule in LinkedIn
      Hi #NLNAM community!

      We have the next meetup scheduled on {{.event_date}} with the help of #{{.event_sponsor}}.
      That is only 2 days from now 😎

      See you at the meetup!

      More info at {{.site_url}}/events/dates/{{.event_date}}_{{.event_sponsor}}/

      EOF
      echo "Schedule for LinkedIn created at {{.file}}"
