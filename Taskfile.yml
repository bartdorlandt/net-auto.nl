version: "3"

vars:
  site_dir: website
  site_url: https://net-auto.nl
  event_url_path: "{{.site_url}}/events/dates"
  event_path: "docs/events/dates"
  rfp_form_url: https://forms.gle/qmjaMqcHLuJV3rTy8
  events_yaml: events.yaml
  upcoming_event_filename:
    sh: |
      # Get current date in YYYYMMDD format
      current_date=$(date +%Y%m%d)

      # Find the next upcoming event file
      upcoming_file=$(find {{.site_dir}}/{{.event_path}}/ -name "*.md" -type f | \
        while read file; do
          filename=$(basename "$file")
          file_date=$(echo "$filename" | cut -d'_' -f1)
          if [[ "$file_date" > "$current_date" ]]; then
            echo "$file_date:$file"
          fi
        done | sort | head -1 | cut -d':' -f2)
        filename=$(basename "$upcoming_file" .md)
        if [[ -z "$filename" ]]; then
          echo "No upcoming events found in {{.site_dir}}/{{.event_path}}/"
          exit 1
        fi
        echo "$filename"
  upcoming_event_date:
    sh: echo "{{.upcoming_event_filename}}" | cut -d'_' -f1
  upcoming_event_sponsor:
    sh: echo "$(yq ".{{.upcoming_event_date}}.sponsor" {{.events_yaml}})"

tasks:
  default: task -l --sort none

  build:
    desc: Build the site
    dir: "{{.site_dir}}"
    cmd: |
      export DYLD_FALLBACK_LIBRARY_PATH=/opt/homebrew/lib
      uv run mkdocs build -v --strict -t material

  test:
    desc: Run the github test workflow with act
    cmds:
      - act -j test

  test:pytest:
    desc: Run pytest
    dir: website
    cmds:
      - uv run pytest -v

  deploy:
    desc: Deploy the site to GitHub Pages branch
    aliases: [deploy]
    prompt:
      - This actually deploys the site. Do you want to continue?
    cmds:
      - uv run mkdocs gh-deploy --force

  serve:
    desc: Serve the site locally at http://localhost:8000/
    dir: website
    cmd: |
      export DYLD_FALLBACK_LIBRARY_PATH=/opt/homebrew/lib
      open http://localhost:8000/
      uv run mkdocs serve

  ### Initialize the repo
  init:
    desc: Initialize this repo install all dependencies for uv and mac
    cmds:
      - task: init:uv
      - task: init:mac

  init:uv:
    desc: Initialize this repo with python dependencies with uv
    cmds:
      - uv sync

  init:mac:
    desc: Initialize this repo with mac dependencies
    platforms:
      - darwin
    cmds:
      - brew install cairo freetype libffi libjpeg libpng zlib pngquant

  event:
    desc: Create a new event, calls event:yaml:create and event:webpage
    aliases: [new, post]
    interactive: true
    silent: true
    cmds:
      - task: event:yaml:create
      - |
        echo "For which event do you want to create the pretix event? Please select the date from the list below:"
        yq 'keys | .[]' {{.events_yaml}}
        echo "--"
        read numberdate
        task event_date=$numberdate event:webpage
        task event_date=$numberdate event:pretix

  event:webpage:
    desc: Create a new event for the website, requires an entry in the {{.events_yaml}} (created by task yaml:create)
    silent: true
    interactive: true
    cmd: |
      if [[ -n "{{.event_date}}" ]]; then
        numberdate="{{.event_date}}"
      else
        echo "For which event do you want to create the pretix event? Please select the date from the list below:"
        yq 'keys | .[]' {{.events_yaml}}
        echo "--"
        read numberdate
      fi
      event_date=$(echo "${numberdate:0:4}-${numberdate:4:2}-${numberdate:6:2}")

      sponsors=$(yq ".$numberdate.sponsor" {{.events_yaml}})
      event_website=$(yq ".$numberdate.website" {{.events_yaml}})
      event_address=$(yq ".$numberdate.address" {{.events_yaml}})
      event_sponsor=$(yq ".$numberdate.sponsor_non_space" {{.events_yaml}})
      event_file=$(yq ".$numberdate.event_file" {{.events_yaml}})
      slug=$(yq ".$numberdate.slug" {{.events_yaml}})
      event_number=$(yq ".$numberdate.event_number" {{.events_yaml}})

      cat << EOF > {{.site_dir}}/{{.event_path}}/$event_file.md
      ---
      # draft: true
      date:
        created: {{ now.Format "2006-01-02" }}
        updated: {{ now.Format "2006-01-02" }}
      title: NLNAM Meetup $event_number @ $sponsors
      description: $event_date NLNAM Meetup $event_number
      ---

      # NLNAM Meetup $event_number @ $sponsors

      The next meetup is hosted by [$sponsors]($event_website){target="_blank"} on $event_date.

      Thank you $sponsors for opening your doors to host us and fill our bellies with pizzas and drinks!

      * [Register for the event](https://pretix.eu/nlnam/${slug}/){target="_blank"}
          * Registration ends on {\{ get_older_date("$event_date", 1) }} at 23:59.
      * [Submit a presentation proposal]({{.rfp_form_url}}){target="_blank"}
          * Talks will be selected and communicated around {\{ get_older_date("$event_date", 30) }}.

      ## Specifics
      * [OPTIONAL] **<u>Bring your ID</u>** to enter the building.
      * [OPTIONAL] We have a hard stop at 21:30. We will need to be outside the building by then.
      * Parking is TODO not available

      ## Location
      {\{ google_maps_link("$event_address") }}

      ## Agenda

      | Time  | Activity                                      |
      | ----- | --------------------------------------------- |
      | 18:00 | Doors open                                    |
      | 18:25 | Welcome + **$event_sponsor** sponsor talk     |
      | 19:00 | Talk 1                                        |
      | 19:30 | Break + Pizza 🍕                               |
      | 20:00 | Talk 2                                        |
      | 20:30 | Talk 3                                        |
      | 21:00 | Closing words + networking                    |
      | 22:00 | Venue closing                                 |

      <!--## Photos
      [Link to photos](link_to_drive)
      -->
      EOF
      sed -i '' \
        -e 's@{\\@{@g' \
        "{{.site_dir}}/{{.event_path}}/$event_file.md"

      task event_date=$numberdate reminders:create:specific_event

  event:pretix:
    desc: Create a new event in pretix, requires an entry in the {{.events_yaml}} (created by task yaml:create)
    silent: true
    prompt:
      - This will create an event in pretix, do you want to continue?
    cmd: |
      if [[ -n "{{.event_date}}" ]]; then
        numberdate="{{.event_date}}"
      else
        echo "For which event do you want to create the pretix event? Please select the date from the list below:"
        yq 'keys | .[]' {{.events_yaml}}
        echo "--"
        read numberdate
      fi
      sponsors=$(yq ".$numberdate.sponsor" {{.events_yaml}})
      slug=$(yq ".$numberdate.slug" {{.events_yaml}})

      uv run create_event.py --date "$numberdate"

  event:bart:
    desc: tmp
    silent: true
    cmd: |
      if [[ -n "{{.event_date}}" ]]; then
        numberdate="{{.event_date}}"
      else
        echo "For which event do you want to create the pretix event? Please select the date from the list below:"
        yq 'keys | .[]' {{.events_yaml}}
        echo "--"
        read numberdate
      fi
      echo "Date selected: $numberdate"

  event:yaml:create:
    desc: Create an entry in the {{.events_yaml}} for the next event
    silent: true
    cmd: |
      echo "Provide the date in format YYYYMMDD for the next event:"
      read event_date
      if [ "$(yq "has(\"$event_date\")" {{.events_yaml}})" = "true" ]; then
        echo "Entry already exists"
        exit 0
      fi
      echo "Provide the sponsor of the next event (in the desired case), multiple sponsors can be separated by ' & ':"
      read event_sponsor
      echo "What is the website? (full: https://net-auto.nl)"
      read event_website
      echo "What is the full address? (used for Gmaps link)"
      read event_address

      sponsor_non_space=$(sed 's/ & /__/g; s/ /_/g' <<< "$event_sponsor")
      event_file="${event_date}_${sponsor_non_space}"
      date_formatted=$(echo "${event_date:0:4}-${event_date:4:2}-${event_date:6:2}")

      if [ "$(yq "has(\"$event_date\")" {{.events_yaml}})" = "true" ]; then
        echo "Entry already exists"
        exit 1
      fi
      slug=$(echo "$event_sponsor" | tr '[:upper:]' '[:lower:]' | sed 's/ & /-/g; s/ //g')

      count=$(yq '. | length' {{.events_yaml}})
      yq -i ".${event_date}.date = \"$event_date\"" {{.events_yaml}}
      yq -i ".${event_date}.sponsor = \"$event_sponsor\"" {{.events_yaml}}
      yq -i ".${event_date}.website = \"$event_website\"" {{.events_yaml}}
      yq -i ".${event_date}.address = \"$event_address\"" {{.events_yaml}}
      yq -i ".${event_date}.event_number = $((count + 1))" {{.events_yaml}}
      yq -i ".${event_date}.sponsor_non_space = \"$sponsor_non_space\"" {{.events_yaml}}
      yq -i ".${event_date}.event_file = \"$event_file\"" {{.events_yaml}}
      yq -i ".${event_date}.date_formatted = \"$date_formatted\"" {{.events_yaml}}
      yq -i ".${event_date}.slug = \"${event_date}-${slug}\"" {{.events_yaml}}

      yq -i 'sort_keys(.) | to_entries | reverse | from_entries' {{.events_yaml}}

  event:yaml:delete:
    desc: Delete an entry in the {{.events_yaml}} for a given date
    silent: true
    cmds:
      - echo "Provide the date (YYYYMMDD) of the event you want to delete from {{.events_yaml}}:"
      - |
        yq 'keys | .[]' {{.events_yaml}}
        echo "--"
        read event_date
        yq -i "del(.${event_date})" {{.events_yaml}}

  reminders:create:upcoming:
    desc: Create reminders for the next upcoming event (dynamically finds the closest future date)
    cmds:
      - task: reminders:create:specific_event
        vars:
          event_date: "{{.upcoming_event_date}}"

  reminders:create:specific_event:
    desc: Create reminders for a specific event, requires the date (YYYYMMDD)
    requires:
      vars:
        - event_date
    vars:
      event_sponsor:
        sh: echo "$(yq ".$event_date.sponsor" {{.events_yaml}})"
      date_formatted:
        sh: echo $(yq ".$event_date.date_formatted" {{.events_yaml}})
      event_file:
        sh: echo $(yq ".$event_date.event_file" {{.events_yaml}})
      slug:
        sh: echo $(yq ".$event_date.slug" {{.events_yaml}})

    deps:
      - task: internal:reminder_rfp
        vars:
          event_date: "{{.event_date}}"
          event_sponsor: "{{.event_sponsor}}"
          date_formatted: "{{.date_formatted}}"
          event_file: "{{.event_file}}"
      - task: internal:reminder_event
        vars:
          event_date: "{{.event_date}}"
          event_sponsor: "{{.event_sponsor}}"
          date_formatted: "{{.date_formatted}}"
          event_file: "{{.event_file}}"
          slug: "{{.slug}}"
      - task: internal:schedule
        vars:
          event_date: "{{.event_date}}"
          event_sponsor: "{{.event_sponsor}}"
          date_formatted: "{{.date_formatted}}"
          event_file: "{{.event_file}}"
          slug: "{{.slug}}"

  internal:reminder_rfp:
    desc: Prepare a reminder to submit RFP for the next event
    silent: true
    internal: true
    vars:
      file: reminders/{{.event_date}}_rfp_linkedin.txt
    requires:
      vars:
        - event_date # YYYYMMDD
        - event_sponsor
        - date_formatted
        - event_file
    cmd: |
      mkdir -p reminders
      rm {{.file}} 2>/dev/null || true
      cat << EOF >> {{.file}}
      Hi #NLNAM community!

      We have the next meetup scheduled on {{.date_formatted}} with the help of #{{.event_sponsor}}.
      We are looking for speakers to present at the event.

      If you have a nice topic you'd like to share with the community, please submit a presentation proposal using:
      {{.rfp_form_url}}

      We especially welcome new speakers.

      If you know someone that should give a talk, please share this message with them!

      See you at the meetup!

      More info at {{.event_url_path}}/{{.event_file}}/

      EOF
      echo "RFP reminder created at {{.file}}"

  internal:reminder_event:
    desc: Prepare a reminder for the next event
    silent: true
    internal: true
    vars:
      file: reminders/{{.event_date}}_event_linkedin.txt
    requires:
      vars:
        - event_date # YYYYMMDD
        - event_sponsor
        - date_formatted
        - event_file
        - slug
    cmd: |
      mkdir -p reminders
      rm {{.file}} 2>/dev/null || true

      cat << EOF >> {{.file}}
      Hi #NLNAM community!

      We have the next meetup scheduled on {{.date_formatted}} with the help of #{{.event_sponsor}}.
      If you haven't registered yet, you can at: https://pretix.eu/nlnam/{{.slug}}/


      At the same time we are always looking for speakers to present at the event.
      If you have a nice topic you'd like to share with the community, please submit a presentation proposal using:

      {{.rfp_form_url}}

      If you know someone that should give a talk, please share this message with them!

      See you at the meetup!

      More info at {{.event_url_path}}/{{.event_file}}/

      EOF
      echo "RFP reminder created at {{.file}}"

  internal:schedule:
    desc: Prepare a schedule for the next event
    silent: true
    internal: true
    vars:
      file: reminders/{{.event_date}}_schedule.txt
    requires:
      vars:
        - event_date
        - event_sponsor
        - date_formatted
        - event_file
        - slug
    cmd: |
      mkdir -p reminders
      rm {{.file}} 2>/dev/null || true

      cat << EOF >> {{.file}}
      Now: post on linkedIn about the new event. "cat reminders/{{.event_date}}_event_linkedin.txt"

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 90))")
      90d - Send out reminder about Event -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_event_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 70))")
      70d - Send out reminder about RfP -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_rfp_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 56))")
      56d - Send out reminder about RfP -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_rfp_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 49))")
      49d - Send out reminder about RfP -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_rfp_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 42))")
      42d - Send out reminder about Event -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_event_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 35))")
      35d - Send out reminder about Event -- Schedule in LinkedIn
      cat reminders/{{.event_date}}_event_linkedin.txt

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 30))")
      30d - Send out reminder about First external speaker -- put in Reminders app

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 23))")
      23d - Send out reminder about Second external speaker -- put in Reminders app

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 14))")
      14d - Send out reminder about Event -- Schedule in LinkedIn
      Hi #NLNAM community!

      We have the next meetup scheduled on {{.event_date}} with the help of #{{.event_sponsor}}.
      If you haven't registered yet, you can at: https://pretix.eu/nlnam/{{.slug}}/

      See you at the meetup!

      More info at {{.event_url_path}}/{{.event_file}}/

      $(uv run python -c "from website.main import _get_older_date; print(_get_older_date(\"{{.date_formatted}}\", 2))")
      2d - Send out last reminder about Event -- Schedule in LinkedIn
      Hi #NLNAM community!

      We have the next meetup scheduled on {{.event_date}} with the help of #{{.event_sponsor}}.
      That is only 2 days from now 😎

      See you at the meetup!

      More info at {{.event_url_path}}/{{.event_file}}/

      EOF
      echo "Schedule for LinkedIn created at {{.file}}"
